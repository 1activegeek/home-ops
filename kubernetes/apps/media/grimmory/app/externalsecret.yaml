---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grimmory
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-store
  target:
    name: grimmory-secret
    template:
      data:
        DB_PASSWORD: "{{ .db_password }}"
        DB_ROOT_PASSWORD: "{{ .db_root_password }}"
  dataFrom:
    - extract:
        key: grimmory
