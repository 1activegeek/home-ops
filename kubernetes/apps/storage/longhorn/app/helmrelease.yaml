---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: longhorn
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    # Longhorn configuration
    defaultSettings:
      defaultReplicaCount: 3
      defaultDataPath: /var/lib/longhorn/
      replicaSoftAntiAffinity: true
      replicaZoneSoftAntiAffinity: true
      storageOverProvisioningPercentage: 200
      storageMinimalAvailablePercentage: 25
      storageReservedPercentageForDefaultDisk: 30
      createDefaultDiskLabeledNodes: true
      defaultDataLocality: best-effort
      replicaAutoBalance: least-effort
      concurrentReplicaRebuildPerNodeLimit: 2
      concurrentVolumeBackupRestorePerNodeLimit: 2
      backupstorePollInterval: 300
      orphanAutoDeletion: true
      guaranteedInstanceManagerCPU: 12
      logLevel: Info
    # CSI settings
    csi:
      attacherReplicaCount: 3
      provisionerReplicaCount: 3
      resizerReplicaCount: 3
      snapshotterReplicaCount: 3
    # Ingress for UI
    ingress:
      enabled: true
      ingressClassName: internal
      host: longhorn.${CLUSTER_DOMAIN}
      tls: true
      tlsSecret: longhorn-tls
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/auth-url: "https://oauth2-proxy.${SECRET_DOMAIN}/oauth2/auth"
        nginx.ingress.kubernetes.io/auth-signin: "https://oauth2-proxy.${SECRET_DOMAIN}/oauth2/start?rd=$scheme://$host$request_uri"
    # Node selector for control plane nodes
    longhornManager:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    longhornDriver:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    longhornUI:
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    # ServiceMonitor for Prometheus
    serviceMonitor:
      enabled: true
    # Persistence for Longhorn system
    persistence:
      defaultClassReplicaCount: 3
      defaultFsType: ext4
      defaultClass: true