---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./namespace.yaml
  - ./crapi/ks.yaml

patches:
  - target:
      kind: Service
      name: mailhog-web
    patch: |-
      - op: replace
        path: /spec/type
        value: ClusterIP

      - op: remove
        path: /spec/ports/0/nodePort
