
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: services-role
  namespace: tai-dev
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get","watch","list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: default-services
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: services-role
subjects:
  - kind: ServiceAccount
    name: default
    namespace: tai-dev
