---
# Public, dual-homed HTTPRoute for echo (no authentication). Class 3.
# Internal parent -> on-LAN resolves to the internal gateway (.53, no hairpin);
# external parent -> public reachability (auth opt-out via public-access component).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo-external
  namespace: default
spec:
  hostnames:
    - echo.${SECRET_DOMAIN}
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: echo
          port: 80
