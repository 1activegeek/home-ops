---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
spec:
  chartRef:
    kind: OCIRepository
    name: headlamp
  interval: 1h
  values:
    controllers:
      main:
        containers:
          app:
            image:
              repository: ghcr.io/headlamp-k8s/headlamp
              tag: v0.43.0
            args:
              - -in-cluster
              - -plugins-dir
              - /headlamp/plugins
            env:
              # OIDC login via Authentik. CLIENT_ID/SECRET come from headlamp-secret.
              OIDC_IDP_ISSUER_URL: https://auth.${SECRET_DOMAIN}/application/o/headlamp/
              OIDC_SCOPES: openid,email,profile
            envFrom:
              - secretRef:
                  name: headlamp-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4466
                  initialDelaySeconds: 10
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4466
                  initialDelaySeconds: 10
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
        serviceAccount:
          name: headlamp
        pod:
          automountServiceAccountToken: true

    service:
      main:
        controller: main
        ports:
          http:
            port: 4466

    route:
      app:
        hostnames: ["headlamp.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: headlamp
                port: 4466
