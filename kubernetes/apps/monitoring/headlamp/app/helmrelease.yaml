---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
spec:
  chartRef:
    kind: OCIRepository
    name: headlamp
  interval: 1h
  values:
    controllers:
      main:
        containers:
          app:
            image:
              repository: ghcr.io/headlamp-k8s/headlamp
              tag: v0.43.0
            args:
              - -in-cluster
              - -plugins-dir
              - /headlamp/plugins
            env:
              # OIDC login via Authentik. CLIENT_ID/SECRET come from headlamp-secret.
              # Headlamp reads config via koanf under the HEADLAMP_CONFIG_ prefix
              # (HEADLAMP_CONFIG_OIDC_IDP_ISSUER_URL -> -oidc-idp-issuer-url).
              # Bare OIDC_* names are silently ignored.
              HEADLAMP_CONFIG_OIDC_IDP_ISSUER_URL: https://auth.${SECRET_DOMAIN}/application/o/headlamp/
              # offline_access is required: Headlamp refreshes the id_token on
              # every API call and hard-fails login ("refreshing token: getting
              # refresh token: key not found") if the IdP issued no refresh
              # token. authentik only returns one when offline_access is granted.
              HEADLAMP_CONFIG_OIDC_SCOPES: openid,email,profile,offline_access
            envFrom:
              - secretRef:
                  name: headlamp-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4466
                  initialDelaySeconds: 10
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4466
                  initialDelaySeconds: 10
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
        serviceAccount:
          name: headlamp
        pod:
          automountServiceAccountToken: true

    service:
      main:
        controller: main
        ports:
          http:
            port: 4466

    route:
      app:
        hostnames: ["headlamp.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: headlamp
                port: 4466
