---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
spec:
  chartRef:
    kind: OCIRepository
    name: headlamp
  interval: 1h
  values:
    controllers:
      main:
        containers:
          app:
            image:
              repository: ghcr.io/headlamp-k8s/headlamp
              tag: v0.43.0
            args:
              - -in-cluster
              - -plugins-dir
              - /headlamp/plugins
            env:
              # OIDC login via Authentik. CLIENT_ID/SECRET come from headlamp-secret.
              # Headlamp reads config via koanf under the HEADLAMP_CONFIG_ prefix
              # (HEADLAMP_CONFIG_OIDC_IDP_ISSUER_URL -> -oidc-idp-issuer-url).
              # Bare OIDC_* names are silently ignored.
              HEADLAMP_CONFIG_OIDC_IDP_ISSUER_URL: https://auth.${SECRET_DOMAIN}/application/o/headlamp/
              # offline_access is required: Headlamp refreshes the token on
              # every API call and hard-fails login ("refreshing token: getting
              # refresh token: key not found") if the IdP issued no refresh
              # token. authentik only returns one when offline_access is granted.
              HEADLAMP_CONFIG_OIDC_SCOPES: openid,email,profile,offline_access
              # Use the access_token (not the id_token) as the bearer + the key
              # for Headlamp's in-memory refresh-token cache. Headlamp stores the
              # refresh token at login keyed by the raw user token, then looks it
              # up on every API-call refresh. With the id_token (default) the
              # store-key and the bearer the SPA replays don't stay byte-identical,
              # so the very first refresh misses -> "getting refresh token: key
              # not found" -> login hangs at "Redirecting to main page...".
              # Keying on the access_token keeps both sides consistent.
              # SAFE for the apiserver: authentik's JWT access_token carries the
              # same iss + aud(=oidc-client-id) + email/email_verified/groups
              # claims the kube-apiserver validates (verified against the live
              # token), so forwarded-token auth is unchanged.
              # headlamp-k8s/headlamp#4134, #4122.
              HEADLAMP_CONFIG_OIDC_USE_ACCESS_TOKEN: "true"
            envFrom:
              - secretRef:
                  name: headlamp-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4466
                  initialDelaySeconds: 10
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4466
                  initialDelaySeconds: 10
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
        serviceAccount:
          name: headlamp
        pod:
          automountServiceAccountToken: true

    service:
      main:
        controller: main
        ports:
          http:
            port: 4466

    route:
      app:
        hostnames: ["headlamp.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: headlamp
                port: 4466

    persistence:
      # Mount the safari-oidc-fix plugin into Headlamp's -plugins-dir. The whole
      # ConfigMap is mounted as a directory (no subPath) so both main.js and
      # package.json land in the plugin folder; Headlamp discovers/serves the
      # ConfigMap's symlinked files fine. The chart stamps a checksum/configMaps
      # pod annotation, so editing the JS below rolls the pod automatically and the
      # new plugin is picked up at startup (in-cluster live watching stays off).
      plugin:
        type: configMap
        identifier: plugin
        globalMounts:
          - path: /headlamp/plugins/safari-oidc-fix
            readOnly: true

    configMaps:
      # Safari-only OIDC login fix. Headlamp runs login in a popup that writes
      # localStorage 'auth_status'='success' and closes; the opener leaves /login
      # on a cross-window 'storage' event, which Safari drops — so login hangs on
      # /c/<cluster>/login even though the token is already stored (Chrome works).
      # No Headlamp flag/version/header fixes this; this opener-side plugin re-checks
      # on focus/visibility/poll (all fire reliably in Safari after the popup closes)
      # and navigates off /login. The devDependencies pin is LOAD-BEARING: the
      # frontend's isCompatible gate (>=0.8.0-alpha.3) silently drops the plugin
      # without it. Plain IIFE, no @kinvolk/headlamp-plugin build step.
      plugin:
        data:
          package.json: |
            {
              "name": "safari-oidc-fix",
              "version": "1.0.0",
              "description": "Recover OIDC login navigation on Safari after the auth popup closes",
              "devDependencies": {
                "@kinvolk/headlamp-plugin": "^0.13.0"
              }
            }
          main.js: |
            // Headlamp Safari OIDC login recovery (side-effect-only, no build step).
            // The OIDC popup writes localStorage 'auth_status'='success' and closes; the
            // opener is supposed to leave /login on a cross-window 'storage' event, which
            // Safari drops. This runs in the opener and recovers by navigating off /login
            // once the token is present — the same effect as manually stripping /login.
            (function () {
              'use strict';
              function recover() {
                try {
                  if (localStorage.getItem('auth_status') !== 'success') return;
                  var path = window.location.pathname;
                  if (!/\/login$/.test(path)) return;
                  localStorage.removeItem('auth_status');
                  window.location.assign(path.replace(/\/login$/, '') || '/');
                } catch (e) { /* no-op */ }
              }
              window.addEventListener('focus', recover);
              document.addEventListener('visibilitychange', function () {
                if (document.visibilityState === 'visible') recover();
              });
              setInterval(recover, 1000);
            })();
