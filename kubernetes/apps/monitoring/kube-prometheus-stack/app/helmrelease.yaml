---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  interval: 1h
  timeout: 15m
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  values:
    # CRDs are managed by the bootstrap helmfile (same chart version)
    crds:
      enabled: false
    cleanPrometheusOperatorObjectNames: true
    fullnameOverride: kps

    defaultRules:
      create: true
      rules:
        # Talos: controller-manager/scheduler bind to localhost; Cilium replaces kube-proxy
        etcd: false
        kubeControllerManager: false
        kubeProxy: false
        kubeSchedulerAlerting: false
        kubeSchedulerRecording: false
        windows: false

    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false
    kubeEtcd:
      enabled: false

    prometheusOperator:
      resources:
        requests:
          cpu: 25m
          memory: 128Mi
        limits:
          memory: 256Mi

    prometheus:
      prometheusSpec:
        # Scrape every ServiceMonitor/PodMonitor/PrometheusRule/Probe/ScrapeConfig
        # in the cluster, regardless of helm release labels
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        enableAdminAPI: true
        walCompression: true
        retention: 14d
        retentionSize: 25GB
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            memory: 2Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-nobackup
              resources:
                requests:
                  storage: 30Gi

    alertmanager:
      enabled: true
      alertmanagerSpec:
        secrets:
          - alertmanager-secret
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn-nobackup
              resources:
                requests:
                  storage: 1Gi
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
      config:
        route:
          group_by: ["alertname", "namespace"]
          group_wait: 1m
          group_interval: 10m
          repeat_interval: 12h
          receiver: discord
          routes:
            - receiver: "null"
              matchers:
                - alertname =~ "Watchdog|InfoInhibitor"
        receivers:
          - name: "null"
          - name: discord
            discord_configs:
              - webhook_url_file: /etc/alertmanager/secrets/alertmanager-secret/webhook-url
                send_resolved: true
                title: >-
                  [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}

    grafana:
      enabled: false
      # Ship the bundled dashboards as ConfigMaps; the existing Grafana
      # sidecar (grafana_dashboard label, searchNamespace ALL) picks them up
      forceDeployDashboards: true

    nodeExporter:
      enabled: true

    kubeStateMetrics:
      enabled: true
