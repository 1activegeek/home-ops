---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma
spec:
  chartRef:
    kind: OCIRepository
    name: uptime-kuma
  interval: 1h
  values:
    controllers:
      uptime-kuma:
        containers:
          app:
            image:
              repository: docker.io/louislam/uptime-kuma
              tag: 2.4.0
            env:
              TZ: America/New_York
              UPTIME_KUMA_PORT: "3001"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 3001
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: uptime-kuma
        ports:
          http:
            port: 3001
    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 4Gi
        globalMounts:
          - path: /app/data
    route:
      app:
        hostnames: ["uptime.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
