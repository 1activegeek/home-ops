---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
data:
  config.yaml: |
    storage:
      type: sqlite
      path: /data/data.db

    security:
      oidc:
        issuer-url: https://auth.${SECRET_DOMAIN}/application/o/gatus/
        redirect-url: https://gatus.${SECRET_DOMAIN}/authorization-code/callback
        client-id: "${OIDC_CLIENT_ID}"
        client-secret: "${OIDC_CLIENT_SECRET}"
        scopes: ["openid", "email", "profile"]

    ui:
      title: Status | Home Ops
      header: Status

    endpoints:
      - name: Gateway (Internal)
        group: infrastructure
        url: "https://echo.${SECRET_DOMAIN}"
        interval: 5m
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"

      - name: Mattermost
        group: tools
        url: "https://matter.${SECRET_DOMAIN}/api/v4/system/ping"
        interval: 5m
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"

      - name: Synapse
        group: tools
        url: "https://synapse.${SECRET_DOMAIN}/health"
        interval: 5m
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"

      - name: MAS
        group: tools
        url: "https://mas.${SECRET_DOMAIN}/"
        interval: 5m
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"

      - name: Element
        group: tools
        url: "https://matrix.${SECRET_DOMAIN}/"
        interval: 5m
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 2000"

      - name: Cloudflare
        group: external
        url: "https://1.1.1.1/cdn-cgi/trace"
        interval: 5m
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 1000"

      - name: Google
        group: external
        url: "https://www.google.com"
        interval: 5m
        conditions:
          - "[STATUS] == 200"
          - "[RESPONSE_TIME] < 1000"
