---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: longhorn-backup-alert
spec:
  # Daily at 05:30 UTC — after the 03:00 daily + Sun 04:00 weekly Longhorn
  # recurring backups complete. Daily cadence keeps a persistent failure to one
  # alert/day rather than spamming.
  schedule: "30 5 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: check
              image: curlimages/curl:8.21.0
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              env:
                - name: METRICS_URL
                  value: "http://longhorn-backend.longhorn-system:9500/metrics"
                # Mattermost delivery: post to #infrastructure via the Jarvis
                # bot token (native avatar + name), internal cluster URL.
                - name: MATTERMOST_URL
                  value: "http://mattermost-main.tools.svc.cluster.local:8065"
                - name: MATTERMOST_CHANNEL_ID
                  value: "6qik9sorwbfcmdzqpwuwhwk69r"
                - name: MATTERMOST_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: longhorn-backup-alert-secret
                      key: MATTERMOST_TOKEN
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  # Longhorn 1.11: longhorn_backup_state value 4 = Error.
                  # Line shape: longhorn_backup_state{backup="..",volume="..",recurring_job=".."} 4
                  BODY=$(curl -sf --max-time 20 "${METRICS_URL}")
                  FAILED=$(printf '%s\n' "${BODY}" | awk '/^longhorn_backup_state\{/ && $NF==4 {print}')
                  if [ -z "${FAILED}" ]; then
                    echo "[$(date -u)] OK — no Longhorn backups in Error state."
                    exit 0
                  fi
                  COUNT=$(printf '%s\n' "${FAILED}" | grep -c .)
                  VOLS=$(printf '%s\n' "${FAILED}" | sed -n 's/.*volume="\([^"]*\)".*/\1/p' | sort -u | tr '\n' ' ')
                  # Volume names are k8s-safe (lowercase alphanumerics + dashes),
                  # so no JSON escaping beyond the static text is required.
                  MSG="**Longhorn backup failure**: ${COUNT} backup(s) in Error state. Volume(s): ${VOLS}"
                  echo "[$(date -u)] ${MSG}"
                  # Post to Mattermost #infrastructure via the Jarvis bot REST API.
                  curl -sf --max-time 20 -X POST "${MATTERMOST_URL}/api/v4/posts" \
                    -H "Authorization: Bearer ${MATTERMOST_TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d "{\"channel_id\":\"${MATTERMOST_CHANNEL_ID}\",\"message\":\"${MSG}\"}" >/dev/null
                  echo "[$(date -u)] Alert dispatched to Mattermost #infrastructure."
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  memory: 64Mi
