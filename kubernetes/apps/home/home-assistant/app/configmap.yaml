---
apiVersion: v1
kind: ConfigMap
metadata:
  name: home-assistant-gai-conf
  namespace: home
data:
  gai.conf: |
    # Prefer IPv4 over IPv6 for dual-stack hosts (e.g. googleapis.com).
    # Thread/Matter devices use ULA (fd::/8) or link-local (fe80::/10) which
    # are IPv6-only — this line has no effect on those connections.
    precedence ::ffff:0:0/96  100
