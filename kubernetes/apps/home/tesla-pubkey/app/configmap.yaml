---
# Replace the placeholder below with the public key PEM generated by
# the Tesla Fleet integration setup in Home Assistant.
apiVersion: v1
kind: ConfigMap
metadata:
  name: tesla-pubkey
  namespace: home
data:
  nginx.conf: |
    server_tokens off;
    server {
      listen 80;
      location = /.well-known/appspecific/com.tesla.3p.public-key.pem {
        root /usr/share/nginx/html;
        default_type application/x-pem-file;
        add_header Cache-Control "public, max-age=3600";
      }
      location / {
        return 404;
      }
    }
  public-key.pem: |
    -----BEGIN PUBLIC KEY-----
    MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEcA5m0kUyrcPBsbGw4FGmIgWQYwzN
    y4vEpiABAuzmTTcgu0FOB7GeXfgKB+7r6MuD7++nQG9AMz33kwxK4/4Xeg==
    -----END PUBLIC KEY-----
