---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bambuddy
spec:
  chartRef:
    kind: OCIRepository
    name: bambuddy
  interval: 1h
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/maziggy/bambuddy
              tag: v0.2.4.2
            env:
              TZ: America/New_York
              # VIRTUAL_PRINTER_PASV_ADDRESS: needed for FTP passive mode from OrcaSlicer (in-cluster).
              # Set to the bambuddy Service ClusterIP:
              #   kubectl get svc bambuddy -n home -o jsonpath='{.spec.clusterIP}'
              # Add BAMBUDDY_PASV_ADDRESS to cluster-secrets, then uncomment:
              # VIRTUAL_PRINTER_PASV_ADDRESS: ${BAMBUDDY_PASV_ADDRESS}
              MFA_ENCRYPTION_KEY:
                valueFrom:
                  secretKeyRef:
                    name: bambuddy-secret
                    key: mfa_encryption_key
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 15
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8000
                  initialDelaySeconds: 15
                  periodSeconds: 10
            securityContext:
              capabilities:
                add:
                  - NET_BIND_SERVICE
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi

    service:
      main:
        controller: main
        ports:
          http:
            port: 8000
          ftps:
            port: 990
          rtsps:
            port: 322

    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /app/data
      library:
        type: persistentVolumeClaim
        existingClaim: print-library
        globalMounts:
          - path: /app/library

    route:
      app:
        hostnames: ["bambuddy.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: bambuddy
                port: 8000
