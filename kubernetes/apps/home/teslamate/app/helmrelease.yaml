---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: teslamate
spec:
  chartRef:
    kind: OCIRepository
    name: teslamate
  interval: 1h
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: teslamate/teslamate
              tag: latest
            env:
              DATABASE_USER: teslamate
              DATABASE_NAME: teslamate
              DATABASE_HOST: localhost
              DATABASE_PORT: "5432"
              DATABASE_PASS:
                valueFrom:
                  secretKeyRef:
                    name: teslamate-secret
                    key: db_password
              ENCRYPTION_KEY:
                valueFrom:
                  secretKeyRef:
                    name: teslamate-secret
                    key: encryption_key
              MQTT_HOST: mosquitto.home.svc.cluster.local
              MQTT_PORT: "1883"
              TZ: America/Denver
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 4000
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi

      postgres:
        containers:
          postgres:
            image:
              repository: postgres
              tag: 17-alpine
            env:
              POSTGRES_DB: teslamate
              POSTGRES_USER: teslamate
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: teslamate-secret
                    key: db_password
              PGDATA: /var/lib/postgresql/data/pgdata
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 512Mi
        pod:
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999

    service:
      main:
        controller: main
        ports:
          http:
            port: 4000
      postgres:
        controller: postgres
        ports:
          postgres:
            port: 5432

    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 5Gi
        advancedMounts:
          postgres:
            postgres:
              - path: /var/lib/postgresql/data

    route:
      app:
        hostnames: ["teslamate.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: teslamate-main
                port: 4000
