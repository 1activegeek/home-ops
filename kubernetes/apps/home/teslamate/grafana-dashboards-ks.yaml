---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: teslamate-grafana-dashboards
spec:
  interval: 1h
  path: ./kubernetes/apps/home/teslamate/grafana/dashboards
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: home
  wait: false
  dependsOn:
    - name: teslamate
