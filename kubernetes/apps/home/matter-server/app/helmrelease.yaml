---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: matter-server
spec:
  chartRef:
    kind: OCIRepository
    name: matter-server
  interval: 1h
  values:
    controllers:
      matter-server:
        containers:
          app:
            image:
              repository: ghcr.io/home-assistant-libs/python-matter-server
              tag: 8.1.2
            args:
              - --storage-path
              - /data
              - --paa-root-cert-dir
              - /data/credentials
              - --primary-interface
              - enp2s0
            env:
              TZ: America/New_York
            securityContext:
              privileged: true  # Required for Matter
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi

    defaultPodOptions:
      hostNetwork: true  # Matter requires host networking
      nodeSelector:
        kubernetes.io/hostname: asgard-mpc-01

    service:
      app:
        controller: matter-server
        ports:
          matter:
            port: 5580

    configMaps:
      gai-conf:
        data:
          gai.conf: |
            # Prefer IPv4 — host has no outbound IPv6 routing
            label  ::1/128        0
            label  ::/0           1
            label  2002::/16      2
            label  ::/96          3
            label  ::ffff:0:0/96  4
            precedence  ::1/128        50
            precedence  ::/0           40
            precedence  2002::/16      30
            precedence  ::/96          20
            precedence  ::ffff:0:0/96  100

    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /data
      gai-conf:
        type: configMap
        identifier: gai-conf
        globalMounts:
          - path: /etc/gai.conf
            subPath: gai.conf
            readOnly: true
