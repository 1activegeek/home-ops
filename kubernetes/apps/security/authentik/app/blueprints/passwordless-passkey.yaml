# Passwordless / usernameless passkey LOGIN.
#
# Adds a dedicated passwordless authentication flow and wires a
# "Login with Passkey" button onto the existing default login page.
# Additive: the only existing object touched is the default identification
# stage, and only its `passwordless_flow` field is set — username + password
# remain as a fallback.
#
# Usernameless works because the credential is a discoverable/resident key
# (see setup-passkey.yaml enrollment) — authentik resolves the user from the
# credential itself, so no username is typed.
version: 1
metadata:
  name: passwordless-passkey-login
entries:
  # Dedicated passwordless authentication flow, reachable by anonymous users.
  - model: authentik_flows.flow
    id: flow-passwordless
    identifiers:
      slug: passwordless-passkey
    attrs:
      name: passwordless-passkey
      title: "Sign in with a passkey"
      designation: authentication
      authentication: require_unauthenticated

  # WebAuthn-only validation. Discoverable credential -> usernameless.
  # not_configured_action: deny -> a visitor with no passkey is rejected here
  # and falls back to the normal username/password path on the login page.
  - model: authentik_stages_authenticator_validate.authenticatorvalidatestage
    id: stage-passwordless-validate
    identifiers:
      name: passwordless-webauthn-validate
    attrs:
      device_classes:
        - webauthn
      webauthn_user_verification: required
      not_configured_action: deny

  # Create the session after a successful passkey. Self-contained (own stage)
  # so this flow never depends on the default login stage's name.
  - model: authentik_stages_user_login.userloginstage
    id: stage-passwordless-login
    identifiers:
      name: passwordless-user-login
    attrs:
      session_duration: seconds=0

  - model: authentik_flows.flowstagebinding
    identifiers:
      target: !KeyOf flow-passwordless
      stage: !KeyOf stage-passwordless-validate
      order: 10
    attrs:
      evaluate_on_plan: true
      re_evaluate_policies: false

  - model: authentik_flows.flowstagebinding
    identifiers:
      target: !KeyOf flow-passwordless
      stage: !KeyOf stage-passwordless-login
      order: 100

  # Wire the "Login with Passkey" button onto the existing default login page.
  # Matching the default stage by name -> in-place patch of ONLY this field.
  - model: authentik_stages_identification.identificationstage
    identifiers:
      name: default-authentication-identification
    attrs:
      passwordless_flow: !KeyOf flow-passwordless
