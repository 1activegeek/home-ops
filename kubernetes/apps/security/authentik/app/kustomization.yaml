---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: security
resources:
  - externalsecret.yaml
  - helmrepository.yaml
  - helmrelease.yaml
  - httproute-external.yaml
  - referencegrant.yaml

# Authentik config-as-code: passwordless passkey login + enrollment.
# Mounted into the authentik pods via helmrelease values.blueprints.configMaps.
# disableNameSuffixHash keeps the name stable so the Helm value can reference it;
# reloader (annotation on the deployments) restarts pods when the content changes.
configMapGenerator:
  - name: authentik-blueprints
    files:
      - blueprints/setup-passkey.yaml

generatorOptions:
  disableNameSuffixHash: true

components:
  - ../../../../components/public-access

replacements:
  # Wire up the public-access SecurityPolicy to target authentik-external HTTPRoute
  - source:
      kind: HTTPRoute
      name: authentik-external
      fieldPath: metadata.name
    targets:
      - select:
          kind: SecurityPolicy
        fieldPaths:
          - spec.targetRefs.0.name
          - metadata.name
        options:
          delimiter: '-'
          index: 0
