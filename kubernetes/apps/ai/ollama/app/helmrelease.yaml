---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
spec:
  chartRef:
    kind: OCIRepository
    name: ollama
  interval: 1h
  values:
    controllers:
      main:
        containers:
          app:
            image:
              repository: ollama/ollama
              tag: 0.31.2
            env:
              OLLAMA_HOST: "0.0.0.0"
            lifecycle:
              postStart:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - |
                      until ollama list >/dev/null 2>&1; do sleep 2; done
                      ollama pull bge-m3
            resources:
              requests:
                cpu: 2000m
                memory: 2048Mi
              limits:
                memory: 8Gi

    service:
      main:
        controller: main
        type: ClusterIP
        ports:
          http:
            port: &port 11434

    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 50Gi
        globalMounts:
          - path: /root/.ollama

    route:
      app:
        hostnames: ["ollama.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: ollama
                port: 11434
