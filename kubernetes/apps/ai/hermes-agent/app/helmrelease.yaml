---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes-agent
spec:
  chartRef:
    kind: OCIRepository
    name: hermes-agent
  interval: 1h
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsUser: 10000
            runAsGroup: 10000
            fsGroup: 10000
        containers:
          gateway:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.7.7
            args: ["gateway", "run"]
            env:
              HERMES_HOME: /opt/data
              # The hermes CLI ships in the image venv (/opt/hermes/.venv/bin) but
              # that dir is not on the image's default PATH, so the agent's own
              # shell-outs to `hermes ...` fail with "hermes: not found". Prepend it.
              PATH: /opt/hermes/.venv/bin:/opt/data/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              PLAYWRIGHT_BROWSERS_PATH: /opt/data/.playwright
              PYTHONUNBUFFERED: "1"
              API_SERVER_ENABLED: "true"
              API_SERVER_HOST: "0.0.0.0"
              API_SERVER_PORT: "8642"
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 3Gi
          dashboard:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.7.7
            args: ["dashboard", "--host", "0.0.0.0", "--no-open", "--insecure"]
            env:
              HERMES_HOME: /opt/data
              # Keep the hermes CLI on PATH here too (see gateway container note).
              PATH: /opt/hermes/.venv/bin:/opt/data/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              # v2026.7.x refuses to bind the dashboard to 0.0.0.0 unless an
              # auth provider is registered (--insecure no longer bypasses
              # this). Wired to Authentik via the bundled self_hosted OIDC
              # plugin — HERMES_DASHBOARD_OIDC_* vars ship in the mounted
              # /opt/data/.env (see externalsecret-dotenv.yaml and
              # kubernetes/apps/security/authentik/app/blueprints/hermes-oidc.yaml),
              # loaded into the process env by hermes's own dotenv handling —
              # same mechanism as MATRIX_* above.
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 9119
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi

    service:
      main:
        controller: main
        ports:
          http:
            port: 9119
          api:
            port: 8642

    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 20Gi
        globalMounts:
          - path: /opt/data
      shared:
        type: nfs
        server: ${NFS_SERVER}
        path: "/volume1/syncthing/ic_documents/5 Shared/hermes"
        globalMounts:
          - path: /opt/data/shared

      hermes-dotenv:
        type: secret
        name: hermes-dotenv
        globalMounts:
          - path: /opt/data/.env
            subPath: .env
            readOnly: true

    route:
      app:
        hostnames: ["hermes.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: hermes-agent
                port: 9119
