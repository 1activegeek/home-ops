---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes-agent
spec:
  chartRef:
    kind: OCIRepository
    name: hermes-agent
  interval: 1h
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsUser: 10000
            runAsGroup: 10000
            fsGroup: 10000
        containers:
          gateway:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.5.16
            # BOOTSTRAP: entrypoint detects `sleep` as an executable and passes
            # it through, activating the venv and scaffolding /opt/data before
            # sleeping. Exec in to run `hermes setup` (OpenAI Codex OAuth device
            # flow), then flip args to: ["gateway", "run"]
            args: ["sleep", "infinity"]
            env:
              HERMES_HOME: /opt/data
              PLAYWRIGHT_BROWSERS_PATH: /opt/data/.playwright
              PYTHONUNBUFFERED: "1"
              API_SERVER_ENABLED: "true"
              API_SERVER_HOST: "0.0.0.0"
              API_SERVER_PORT: "8642"
            resources:
              requests:
                cpu: 250m
                memory: 512Mi
              limits:
                memory: 3Gi
          dashboard:
            image:
              repository: docker.io/nousresearch/hermes-agent
              tag: v2026.5.16
            # BOOTSTRAP: same pattern — entrypoint runs, venv activated, then
            # sleeps. After `hermes setup`, flip args to:
            # ["dashboard", "--host", "0.0.0.0", "--no-open", "--insecure"]
            # and re-add the HTTP liveness/readiness probes (GET / :9119).
            args: ["sleep", "infinity"]
            env:
              HERMES_HOME: /opt/data
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi

    service:
      main:
        controller: main
        ports:
          http:
            port: 9119
          api:
            port: 8642

    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 20Gi
        globalMounts:
          - path: /opt/data
      shared:
        type: nfs
        server: ${NFS_SERVER}
        path: "/volume1/syncthing/ic_documents/5 Shared/hermes"
        globalMounts:
          - path: /opt/data/shared

      hermes-dotenv:
        type: secret
        name: hermes-dotenv
        globalMounts:
          - path: /opt/data/.env
            subPath: .env
            readOnly: true

    route:
      app:
        hostnames: ["hermes.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: hermes-agent
                port: 9119
