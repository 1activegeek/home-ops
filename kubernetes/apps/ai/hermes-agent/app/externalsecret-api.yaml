---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-api-server
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-store
  target:
    name: hermes-api-server-secret
  dataFrom:
    - extract:
        key: hermes-api-server
