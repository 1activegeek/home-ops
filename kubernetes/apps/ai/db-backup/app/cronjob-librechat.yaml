---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup-librechat
spec:
  schedule: "20 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: dump
              image: mongo:8.3
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: ["ALL"]
              env:
              - name: MONGO_URI
                valueFrom:
                  secretKeyRef:
                    name: librechat-secret
                    key: mongo_uri
              - name: RETENTION_DAYS
                value: "14"
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -euo pipefail
                  TS=$(date +%Y%m%d-%H%M%S)
                  OUT="/backups/librechat-${TS}.archive.gz"
                  echo "[$(date -u)] mongodump librechat -> ${OUT}"
                  mongodump --uri="${MONGO_URI}" --gzip --archive="${OUT}"
                  ls -lh "${OUT}"
                  echo "Pruning librechat-*.archive.gz older than ${RETENTION_DAYS}d"
                  find /backups -name 'librechat-*.archive.gz' -type f -mtime +${RETENTION_DAYS} -print -delete
                  echo "done"
              volumeMounts:
                - name: backups
                  mountPath: /backups
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  memory: 512Mi
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: db-backups
