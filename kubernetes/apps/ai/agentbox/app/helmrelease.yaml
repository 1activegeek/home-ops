---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentbox
spec:
  chartRef:
    kind: OCIRepository
    name: agentbox
  interval: 1h
  values:
    controllers:
      main:
        # Recreate (not RollingUpdate): the single RWO config PVC can't be
        # held by two pods at once, so the old pod must release before the new
        # one attaches.
        strategy: Recreate
        containers:
          app:
            image:
              repository: mcr.microsoft.com/playwright
              tag: v1.61.0-jammy
            command: ["/bin/bash", "/scripts/entrypoint.sh"]
            env:
              TZ: America/Denver
              TS_HOSTNAME: agentbox
              HOME: /home/pwuser
              SHELL: /home/pwuser/.local/bin/zsh
              NPM_CONFIG_PREFIX: /home/pwuser/.npm-global
              PLAYWRIGHT_BROWSERS_PATH: /home/pwuser/.cache/ms-playwright
              TS_AUTHKEY:
                valueFrom:
                  secretKeyRef:
                    name: agentbox-secret
                    key: ts_authkey
            resources:
              requests:
                cpu: "1"
                memory: 2Gi
              limits:
                cpu: "4"
                memory: 8Gi
                ephemeral-storage: 10Gi
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000

    persistence:
      # Disposable workstation home (CLI auth, config, caches, session state).
      # Uses longhorn-nobackup (see storageclass.yaml) so the volume is NOT in
      # the Longhorn "default" recurring-job group — no snapshots, no off-box
      # backup. Auth tokens must never reach the NAS backup; nothing here is
      # irreplaceable (CLIs reinstall, tokens re-login, work lives on NFS+git).
      config:
        type: persistentVolumeClaim
        storageClass: longhorn-nobackup
        accessMode: ReadWriteOnce
        size: 20Gi
        globalMounts:
          - path: /home/pwuser
      # Chromium shared memory.
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        globalMounts:
          - path: /dev/shm
      # Boot entrypoint.
      scripts:
        type: configMap
        name: agentbox-scripts
        defaultMode: 0755
        globalMounts:
          - path: /scripts
      # Vendored shell dotfiles (zellij config + zsh aliases), base64 in the
      # ConfigMap; entrypoint copies them onto the PVC at boot.
      dotfiles:
        type: configMap
        name: agentbox-dotfiles
        globalMounts:
          - path: /dotfiles
      # Obsidian vault (SyncThing replica). Export root verified: /volume1/syncthing.
      vault:
        type: nfs
        server: ${NFS_SERVER}
        path: /volume1/syncthing/ic_obsidian/lifeOS
        globalMounts:
          - path: /data/lifeOS
      # Full iCloud Files PARA tree (SyncThing replica).
      documents:
        type: nfs
        server: ${NFS_SERVER}
        path: /volume1/syncthing/ic_documents
        globalMounts:
          - path: /data/documents

    # No service, no route: internal-only by absence. Reachable solely via
    # Tailscale SSH (in-container, userspace) and the outbound Claude relay.
