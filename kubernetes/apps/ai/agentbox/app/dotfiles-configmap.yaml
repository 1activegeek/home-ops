---
# Shawn's personal shell dotfiles, vendored for the agentBox pod.
# Stored as base64 in binaryData (NOT data:) on purpose: Flux's postBuild
# substituteFrom rewrites any brace-form ${VAR} in the rendered manifest to an
# empty string (see reference_flux_postbuild_shell_vars — bit PRs #333/#334).
# The zsh aliases and zellij config both contain ${...} parameter expansions;
# base64's alphabet has no '$', so the content survives substitution verbatim.
# binaryData is auto-decoded by kubelet when mounted, so the pod sees real files.
#
# Regenerate after editing the source dotfiles:
#   base64 -w0 ~/.config/zellij/config.kdl
#   base64 -w0 <curated-aliases.zsh>
apiVersion: v1
kind: ConfigMap
metadata:
  name: agentbox-dotfiles
binaryData:
  config.kdl: 

  aliases.zsh: 
