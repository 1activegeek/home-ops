---
# Requires a 1Password item named "agentbox" in the homeops vault with a
# field "ts_authkey" (a reusable, ephemeral, tag:agentbox-scoped Tailscale
# auth key). Created in Plan 2 (Tailscale prerequisites). Until that item
# exists this ExternalSecret stays unfulfilled and the pod won't join the
# tailnet — expected during initial scaffold.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agentbox
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-store
  target:
    name: agentbox-secret
  # Fetch the ts_authkey field explicitly (not dataFrom.extract): the 1Password
  # item has a notes/field collision that makes extract fail with
  # "expected one ItemField matching 'notesPlain', got 2". Pulling the named
  # field by property sidesteps the whole-item scan. Matches the mosquitto
  # ExternalSecret pattern.
  data:
    - secretKey: ts_authkey
      remoteRef:
        key: agentbox
        property: ts_authkey
