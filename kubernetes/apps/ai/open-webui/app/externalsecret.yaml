---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-webui-hermes
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-store
  target:
    name: open-webui-hermes-secret
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: hermes-api-server
        property: API_SERVER_KEY
