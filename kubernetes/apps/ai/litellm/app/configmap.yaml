---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
data:
  config.yaml: |
    model_list:
      - model_name: llama3.2
        litellm_params:
          model: ollama/llama3.2:3b
          api_base: http://ollama.ai.svc.cluster.local:11434
      - model_name: phi3
        litellm_params:
          model: ollama/phi3:mini
          api_base: http://ollama.ai.svc.cluster.local:11434
    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
