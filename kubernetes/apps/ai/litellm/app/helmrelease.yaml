---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
spec:
  chartRef:
    kind: OCIRepository
    name: litellm
  interval: 1h
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/berriai/litellm
              tag: main-latest
            args: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
            env:
              ANTHROPIC_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secret
                    key: anthropic_api_key
              OPENAI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secret
                    key: openai_api_key
              LITELLM_MASTER_KEY:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secret
                    key: master_key
              DATABASE_URL:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secret
                    key: database_url
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/liveliness
                    port: &port 4000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1Gi

      postgres:
        containers:
          postgres:
            image:
              repository: postgres
              tag: 17-alpine
            env:
              POSTGRES_DB: litellm
              POSTGRES_USER: litellm
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: litellm-secret
                    key: db_password
              PGDATA: /var/lib/postgresql/data/pgdata
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi
        pod:
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999

    service:
      main:
        controller: main
        ports:
          http:
            port: *port
      postgres:
        controller: postgres
        ports:
          postgres:
            port: 5432

    persistence:
      config:
        type: configMap
        name: litellm-config
        advancedMounts:
          main:
            app:
              - path: /app/config.yaml
                subPath: config.yaml
                readOnly: true
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 2Gi
        advancedMounts:
          postgres:
            postgres:
              - path: /var/lib/postgresql/data

    route:
      app:
        hostnames: ["llm.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: litellm-main
                port: 4000
