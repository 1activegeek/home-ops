---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ori-agent
spec:
  chartRef:
    kind: OCIRepository
    name: ori-agent
  interval: 1h
  values:
    controllers:
      main:
        # single long-lived agent; /home PVC is RWO so never run two at once
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"   # restart when the bootstrap ConfigMap changes
        serviceAccount:
          name: ori-agent                      # defined in rbac.yaml — lets in-cluster kubectl work
        pod:
          automountServiceAccountToken: true
        containers:
          app:
            # stock public image: Debian 12 (bookworm) + Node 22. No custom build.
            image:
              repository: docker.io/library/node
              tag: 22-bookworm
            # bootstrap installs sshd/zellij/claude/kubectl then exec's sshd
            command: ["/usr/bin/env", "bash", "/config/bootstrap.sh"]
            env:
              TZ: America/Denver
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 22
                  initialDelaySeconds: 45
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 22
                  initialDelaySeconds: 30
                  periodSeconds: 15
            resources:
              requests:
                cpu: 200m
                memory: 1Gi
              limits:
                memory: 6Gi

    # runs as root so bootstrap can apt-install + run sshd; login user is `ori` (uid 1000).
    # fsGroup 1000 keeps the /home PVC writable by ori.
    defaultPodOptions:
      securityContext:
        fsGroup: 1000

    service:
      # Cilium L2 LoadBalancer -> pinned LAN IP. Also reachable over Tailscale via the
      # existing subnet router. The IP is pinned (so SSH config can use a stable
      # IP/host across recreations) but sourced from the cluster-secret ORI_AGENT_LB_IP
      # rather than committed in plaintext.
      ssh:
        controller: main
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "${ORI_AGENT_LB_IP}"
          external-dns.alpha.kubernetes.io/hostname: ori-agent.${SECRET_DOMAIN}
        ports:
          ssh:
            port: 22
            protocol: TCP

    persistence:
      # bootstrap script + authorized_keys (your public key), mounted read-only
      bootstrap:
        type: configMap
        name: ori-agent-bootstrap
        defaultMode: 0555
        globalMounts:
          - path: /config
            readOnly: true
      # Claude auth (live login), skills, MCP, zellij sessions, ssh host keys, installed tools
      home:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 20Gi
        globalMounts:
          - path: /home/ori
      # projects folder (Syncthing -> Synology, already NFS-exported and used by code-server)
      projects:
        type: nfs
        server: ${NFS_SERVER}
        path: /volume2/projects
        globalMounts:
          - path: /workspace/projects
      # LifeOS vault (Syncthing -> Synology -> NFS export). Different volume than projects.
      lifeos:
        type: nfs
        server: ${NFS_SERVER}
        path: /volume1/syncthing/ic_obsidian/lifeOS
        globalMounts:
          - path: /workspace/lifeOS
