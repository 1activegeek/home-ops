---
# Bootstrap for ori-agent. Runs as root on every pod start against the
# stock public image (docker.io/library/node:22-bookworm = Debian 12 + Node 22).
# Installs sshd + tooling, persists the heavy bits to the Longhorn PVC so reboots
# are fast, then runs sshd in the foreground.
#
# NOTE: there is deliberately NO Claude auth here. You SSH in and run `claude`
# once to authenticate live; credentials land in /home/ori/.claude on the PVC
# and persist across restarts.
#
# authorized_keys holds a *public* key (safe to commit). Replace the placeholder
# with your key: `cat ~/.ssh/id_ed25519.pub`.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ori-agent-bootstrap
  annotations:
    # The bootstrap script is full of shell ${VAR} refs. The parent ks.yaml runs
    # Flux postBuild substituteFrom (for ${ORI_AGENT_LB_IP}/${SECRET_DOMAIN}/${NFS_SERVER}
    # in the HelmRelease), which would otherwise blank every unknown ${VAR} here.
    # Opt this object out so the script reaches the pod verbatim.
    kustomize.toolkit.fluxcd.io/substitute: disabled
data:
  authorized_keys: |
    ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICj962t+RwZGIrcycomEDvbgWAoiFVQT9X6YIvJMVPaX shawn@mac

  bootstrap.sh: |
    #!/usr/bin/env bash
    set -euo pipefail

    AGENT_USER=ori
    HOME_DIR=/home/ori
    LOCAL_BIN="${HOME_DIR}/.local/bin"
    NPM_PREFIX="${HOME_DIR}/.npm-global"
    HOSTKEY_DIR="${HOME_DIR}/.ssh/hostkeys"

    ZELLIJ_VERSION=0.43.1
    KUBECTL_VERSION=v1.35.0
    RIPGREP_VERSION=14.1.1

    log() { echo "[bootstrap] $*"; }
    case "$(uname -m)" in
      x86_64)  ARCH_GNU=x86_64;  ARCH_K8S=amd64 ;;
      aarch64) ARCH_GNU=aarch64; ARCH_K8S=arm64 ;;
      *) log "unsupported arch $(uname -m)"; exit 1 ;;
    esac

    # --- system packages (stock node:bookworm is minimal — no sshd/sudo/ssh-keygen) ---
    # openssh-client carries ssh-keygen (host-key gen below); sudo creates /etc/sudoers.d.
    # Must run BEFORE the user block, which writes to /etc/sudoers.d.
    if ! command -v sshd >/dev/null 2>&1 && [ ! -x /usr/sbin/sshd ]; then
      log "installing openssh-server + extras via apt"
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -qq
      apt-get install -y -qq --no-install-recommends \
        openssh-server openssh-client sudo less jq nano ca-certificates
    fi

    # --- login user: free uid 1000 (taken by stock `node` user), make `ori` ---
    if ! id "${AGENT_USER}" >/dev/null 2>&1; then
      userdel node >/dev/null 2>&1 || true
      groupdel node >/dev/null 2>&1 || true
      groupadd -g 1000 "${AGENT_USER}" 2>/dev/null || true
      useradd -u 1000 -g 1000 -d "${HOME_DIR}" -s /bin/bash "${AGENT_USER}" 2>/dev/null || true
      install -d -m 0750 /etc/sudoers.d
      echo "${AGENT_USER} ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/ori
      chmod 0440 /etc/sudoers.d/ori
    fi

    mkdir -p "${LOCAL_BIN}" "${HOSTKEY_DIR}" "${HOME_DIR}/.claude" \
             "${HOME_DIR}/.config/zellij" "${NPM_PREFIX}" /run/sshd /workspace

    # --- zellij (static binary, persisted to PVC) ---
    if [ ! -x "${LOCAL_BIN}/zellij" ]; then
      log "downloading zellij ${ZELLIJ_VERSION}"
      curl -fsSL "https://github.com/zellij-org/zellij/releases/download/v${ZELLIJ_VERSION}/zellij-${ARCH_GNU}-unknown-linux-musl.tar.gz" \
        | tar -xz -C "${LOCAL_BIN}" && chmod +x "${LOCAL_BIN}/zellij"
    fi

    # --- kubectl (so the agent can operate its own cluster via the ServiceAccount) ---
    if [ ! -x "${LOCAL_BIN}/kubectl" ]; then
      log "downloading kubectl ${KUBECTL_VERSION}"
      curl -fsSL -o "${LOCAL_BIN}/kubectl" "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/${ARCH_K8S}/kubectl" \
        && chmod +x "${LOCAL_BIN}/kubectl"
    fi

    # --- ripgrep (nice-to-have for code search) ---
    if [ ! -x "${LOCAL_BIN}/rg" ]; then
      log "downloading ripgrep ${RIPGREP_VERSION}"
      curl -fsSL "https://github.com/BurntSushi/ripgrep/releases/download/${RIPGREP_VERSION}/ripgrep-${RIPGREP_VERSION}-${ARCH_GNU}-unknown-linux-musl.tar.gz" \
        | tar -xz -C /tmp \
        && cp "/tmp/ripgrep-${RIPGREP_VERSION}-${ARCH_GNU}-unknown-linux-musl/rg" "${LOCAL_BIN}/rg" || true
    fi

    # --- Claude Code (npm global into persistent prefix; install only if missing) ---
    export PATH="${NPM_PREFIX}/bin:${LOCAL_BIN}:${PATH}"
    npm config set prefix "${NPM_PREFIX}" >/dev/null 2>&1 || true
    if [ ! -x "${NPM_PREFIX}/bin/claude" ]; then
      log "installing @anthropic-ai/claude-code"
      npm install -g @anthropic-ai/claude-code >/dev/null 2>&1 || log "claude install failed (retry on next boot)"
    fi

    # --- agent login profile: PATH + auto-attach zellij ---------------------------
    ENVRC="${HOME_DIR}/.config/ori-agent.env"
    cat > "${ENVRC}" <<EOF
    # generated by bootstrap — do not edit
    export PATH="${NPM_PREFIX}/bin:${LOCAL_BIN}:\$PATH"
    export TZ="${TZ:-America/Denver}"
    export EDITOR="${EDITOR:-nano}"
    export KUBECONFIG=""   # use in-cluster ServiceAccount creds
    EOF

    BASHRC="${HOME_DIR}/.bashrc"
    if ! grep -q "ori-agent-login" "${BASHRC}" 2>/dev/null; then
      cat >> "${BASHRC}" <<'EOF'

    # --- ori-agent-login (managed) ---
    [ -f "$HOME/.config/ori-agent.env" ] && . "$HOME/.config/ori-agent.env"
    if command -v zellij >/dev/null 2>&1 && [[ $- == *i* ]] && [ -z "${ZELLIJ:-}" ] && [ "${ZJ:-1}" != "0" ]; then
      exec zellij attach --create main
    fi
    # --- end ori-agent-login ---
    EOF
    fi

    # SSH gives a login shell, which reads .bash_profile (NOT .bashrc). The `ori`
    # user was made with useradd (no skel), so source .bashrc explicitly.
    if [ ! -f "${HOME_DIR}/.bash_profile" ]; then
      printf '%s\n' '[ -f "$HOME/.bashrc" ] && . "$HOME/.bashrc"' > "${HOME_DIR}/.bash_profile"
    fi

    # --- ssh: persistent host keys + authorized_keys from the mounted ConfigMap ---
    if ! ls "${HOSTKEY_DIR}"/ssh_host_*_key >/dev/null 2>&1; then
      log "generating persistent SSH host keys"
      ssh-keygen -t ed25519 -f "${HOSTKEY_DIR}/ssh_host_ed25519_key" -N "" >/dev/null
      ssh-keygen -t rsa -b 4096 -f "${HOSTKEY_DIR}/ssh_host_rsa_key" -N "" >/dev/null
    fi
    chmod 600 "${HOSTKEY_DIR}"/ssh_host_*_key
    install -d -m 700 "${HOME_DIR}/.ssh"
    install -m 600 /config/authorized_keys "${HOME_DIR}/.ssh/authorized_keys"

    chown -R 1000:1000 "${HOME_DIR}"

    cat > /etc/ssh/sshd_config <<EOF
    Port 22
    AddressFamily any
    ListenAddress 0.0.0.0
    ListenAddress ::
    HostKey ${HOSTKEY_DIR}/ssh_host_ed25519_key
    HostKey ${HOSTKEY_DIR}/ssh_host_rsa_key
    PermitRootLogin no
    PasswordAuthentication no
    KbdInteractiveAuthentication no
    PubkeyAuthentication yes
    AuthorizedKeysFile ${HOME_DIR}/.ssh/authorized_keys
    AllowUsers ${AGENT_USER}
    UsePAM yes
    AllowTcpForwarding yes
    ClientAliveInterval 60
    ClientAliveCountMax 10
    PrintMotd no
    Subsystem sftp internal-sftp
    EOF

    log "starting sshd on :22 (login user: ${AGENT_USER}, key-only)"
    exec /usr/sbin/sshd -D -e
