---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: syncthing
spec:
  chartRef:
    kind: OCIRepository
    name: syncthing
  interval: 1h
  values:
    controllers:
      main:
        containers:
          app:
            image:
              repository: syncthing/syncthing
              tag: 2.1.0
            env:
              TZ: America/Denver
              PUID: ${MEDIA_UID}
              PGID: ${MEDIA_GID}
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /rest/noauth/health
                    port: 8384
                  initialDelaySeconds: 15
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /rest/noauth/health
                    port: 8384
                  initialDelaySeconds: 15
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1027
        runAsGroup: 100
        fsGroup: 100

    service:
      app:
        controller: main
        ports:
          http:
            port: 8384
      sync:
        controller: main
        type: LoadBalancer
        ports:
          sync-tcp:
            port: 22000
            protocol: TCP
          sync-udp:
            port: 22000
            protocol: UDP
          discovery:
            port: 21027
            protocol: UDP

    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /var/syncthing/config
      projects:
        type: nfs
        server: ${NFS_SERVER}
        path: /volume2/projects
        globalMounts:
          - path: /var/syncthing/projects

    route:
      app:
        hostnames: ["syncthing.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: syncthing-app
                port: 8384
