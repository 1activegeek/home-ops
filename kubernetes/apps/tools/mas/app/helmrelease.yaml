---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mas
spec:
  chartRef:
    kind: OCIRepository
    name: mas
  interval: 1h
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/element-hq/matrix-authentication-service
              tag: 1.20.0
            args:
              - server
              - --config
              - /config/config.yaml
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8081
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 1Gi
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            fsGroupChangePolicy: OnRootMismatch

      postgres:
        strategy: Recreate
        containers:
          postgres:
            image:
              repository: postgres
              tag: 18-alpine
            env:
              POSTGRES_DB: mas
              POSTGRES_USER: mas
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: mas-secret
                    key: db_password
              PGDATA: /var/lib/postgresql/data/pgdata
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
        pod:
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999

    service:
      main:
        controller: main
        ports:
          http:
            port: 8080
      postgres:
        controller: postgres
        ports:
          postgres:
            port: 5432

    persistence:
      postgres-data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 2Gi
        advancedMounts:
          postgres:
            postgres:
              - path: /var/lib/postgresql/data
      config:
        type: secret
        name: mas-secret
        advancedMounts:
          main:
            app:
              - path: /config/config.yaml
                subPath: config.yaml
                readOnly: true

    route:
      app:
        hostnames: ["mas.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: mas-main
                port: 8080
