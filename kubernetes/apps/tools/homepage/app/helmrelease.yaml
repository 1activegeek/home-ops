---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homepage
spec:
  chartRef:
    kind: OCIRepository
    name: homepage
  interval: 1h
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/gethomepage/homepage
              tag: latest
            env:
              TZ: America/New_York
              HOMEPAGE_ALLOWED_HOSTS: "home.${SECRET_DOMAIN}"
              HOMEPAGE_VAR_TAUTULLI_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: homepage-secret
                    key: tautulli_api_key
              HOMEPAGE_VAR_SEERR_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: homepage-secret
                    key: seerr_api_key
              HOMEPAGE_VAR_RADARR_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: homepage-secret
                    key: radarr_api_key
              HOMEPAGE_VAR_SONARR_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: homepage-secret
                    key: sonarr_api_key
              HOMEPAGE_VAR_PROWLARR_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: homepage-secret
                    key: prowlarr_api_key
              HOMEPAGE_VAR_RADARR4K_API_KEY:
                valueFrom:
                  secretKeyRef:
                    name: homepage-secret
                    key: radarr4k_api_key
              HOMEPAGE_VAR_PLEX_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: homepage-secret
                    key: plex_token
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 3000
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi

    service:
      main:
        controller: main
        ports:
          http:
            port: *port

    persistence:
      config:
        type: configMap
        name: homepage-config
        globalMounts:
          - path: /app/config/services.yaml
            subPath: services.yaml
          - path: /app/config/widgets.yaml
            subPath: widgets.yaml
          - path: /app/config/settings.yaml
            subPath: settings.yaml
          - path: /app/config/bookmarks.yaml
            subPath: bookmarks.yaml
          - path: /app/config/custom.css
            subPath: custom.css

    route:
      app:
        hostnames: ["home.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: homepage
                port: 3000
