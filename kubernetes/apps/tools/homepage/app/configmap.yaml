---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    title: Home Ops
    theme: dark
    color: slate
    headerStyle: clean
    statusStyle: "dot"
    disableIndexing: true
    layout:
      Media:
        style: row
        columns: 4
      Downloads:
        style: row
        columns: 4
      Home:
        style: row
        columns: 2
      AI:
        style: row
        columns: 4
      Infrastructure:
        style: row
        columns: 4
      Tools:
        style: row
        columns: 4

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: brave
        focus: true
        target: _blank
    - datetime:
        text_size: xl
        format:
          dateStyle: long
          timeStyle: short
  services.yaml: |
    - Media:
        - Plex:
            icon: plex.svg
            href: "{{HOMEPAGE_VAR_PLEX_URL}}"
            description: Media Server
            ping: "{{HOMEPAGE_VAR_PLEX_URL}}"
            widget:
              type: plex
              url: "{{HOMEPAGE_VAR_PLEX_URL}}"
              key: "{{HOMEPAGE_VAR_PLEX_TOKEN}}"
        - Seerr:
            icon: overseerr.svg
            href: https://requests.${SECRET_DOMAIN}
            description: Media Requests
            ping: seerr.media.svc.cluster.local:5055
            widget:
              type: overseerr
              url: http://seerr.media.svc.cluster.local:5055
              key: "{{HOMEPAGE_VAR_SEERR_API_KEY}}"
        - Radarr:
            icon: radarr.svg
            href: https://radarr.${SECRET_DOMAIN}
            description: Movies
            siteMonitor: http://radarr.media.svc.cluster.local:7878
            widget:
              type: radarr
              url: http://radarr.media.svc.cluster.local:7878
              key: "{{HOMEPAGE_VAR_RADARR_API_KEY}}"
        - Radarr 4K:
            icon: radarr.svg
            href: https://radarr4k.${SECRET_DOMAIN}
            description: Movies (4K)
            widget:
              type: radarr
              url: http://radarr4k.media.svc.cluster.local:7878
              key: "{{HOMEPAGE_VAR_RADARR4K_API_KEY}}"
        - Sonarr:
            icon: sonarr.svg
            href: https://sonarr.${SECRET_DOMAIN}
            description: TV Shows
            widget:
              type: sonarr
              url: http://sonarr.media.svc.cluster.local:8989
              key: "{{HOMEPAGE_VAR_SONARR_API_KEY}}"
        - Tautulli:
            icon: tautulli.svg
            href: https://tautulli.${SECRET_DOMAIN}
            description: Plex Stats
            widget:
              type: tautulli
              url: http://tautulli.media.svc.cluster.local:8181
              key: "{{HOMEPAGE_VAR_TAUTULLI_API_KEY}}"
        - Audiobookshelf:
            icon: audiobookshelf.svg
            href: https://audiobooks.${SECRET_DOMAIN}
            description: Audiobooks & Podcasts
        - Bazarr:
            icon: bazarr.svg
            href: https://bazarr.${SECRET_DOMAIN}
            description: Subtitles
    - Downloads:
        - Prowlarr:
            icon: prowlarr.svg
            href: https://prowlarr.${SECRET_DOMAIN}
            description: Indexer Manager
            widget:
              type: prowlarr
              url: http://prowlarr.media.svc.cluster.local:9696
              key: "{{HOMEPAGE_VAR_PROWLARR_API_KEY}}"
        - qBittorrent:
            icon: qbittorrent.svg
            href: https://qbit.${SECRET_DOMAIN}
            description: Torrent Client
        - SABnzbd:
            icon: sabnzbd.svg
            href: https://sabnzbd.${SECRET_DOMAIN}
            description: Usenet Client
        - MeTube:
            icon: metube.svg
            href: https://metube.${SECRET_DOMAIN}
            description: YouTube Downloader
    - Home:
        - Home Assistant:
            icon: home-assistant.svg
            href: https://hass.${SECRET_DOMAIN}
            description: Home Automation
        - TeslaMate:
            icon: teslamate.svg
            href: https://teslamate.${SECRET_DOMAIN}
            description: Tesla Tracking
    - Infrastructure:
        - Grafana:
            icon: grafana.svg
            href: https://grafana.${SECRET_DOMAIN}
            description: Monitoring Dashboards
        - Gatus:
            icon: gatus.svg
            href: https://gatus.${SECRET_DOMAIN}
            description: Uptime Monitoring
        - Authentik:
            icon: authentik.svg
            href: https://auth.${SECRET_DOMAIN}
            description: Identity Provider
        - Longhorn:
            icon: longhorn.svg
            href: https://longhorn.${SECRET_DOMAIN}
            description: Storage
    - Tools:
        - Forgejo:
            icon: gitea.svg
            href: https://git.${SECRET_DOMAIN}
            description: Git Repos
        - Shlink:
            icon: shlink.svg
            href: https://shlink.${SECRET_DOMAIN}
            description: URL Shortener
        - Zipline:
            icon: zipline.svg
            href: https://zipline.${SECRET_DOMAIN}
            description: File Sharing
        - Apprise:
            icon: sh-apprise
            href: https://apprise.${SECRET_DOMAIN}
            description: Notifications
    - AI:
        - LibreChat:
            icon: librechat.svg
            href: https://librechat.${SECRET_DOMAIN}
            description: AI Chat
        - Open WebUI:
            icon: open-webui.svg
            href: https://chat.${SECRET_DOMAIN}
            description: Chat UI
        - N8N:
            icon: n8n.svg
            href: https://n8n.${SECRET_DOMAIN}
            description: Automation
        - LiteLLM:
            icon: sh-litellm
            href: https://llm.${SECRET_DOMAIN}
            description: LLM Proxy

  custom.css: |
    /* Catppuccin Mocha — Mauve accent */

    .dark {
      --bg-color: #1e1e2e;
      --scrollbar-thumb: #89b4fa;
      --scrollbar-track: #181825;
    }

    /* Page background */
    .dark .dark\:bg-theme-800 {
      background-color: #1e1e2e;
    }

    /* Info widget progress bar background */
    .dark .dark\:bg-theme-200\/20 {
      background-color: #6c7086;
    }

    /* Info widget progress bar value */
    .dark .dark\:bg-theme-200\/50 {
      background-color: #cdd6f4;
    }

    /* Search bar border */
    .border-theme-300 {
      border-color: #313244 !important;
    }

    /* Search bar background */
    .dark .dark\:bg-white\/10 {
      background-color: #1e1e2e;
    }

    /* Search bar focus ring */
    .dark .dark\:focus\:ring-white\/50:focus {
      --tw-ring-color: #cdd6f4;
    }

    /* Search bar text + icon accent */
    .dark .dark\:text-white {
      color: #89b4fa;
    }

    /* Service card background */
    .dark .dark\:bg-white\/5 {
      background-color: #181825;
    }

    /* Service card shadow */
    .dark .dark\:shadow-theme-900\/20 {
      --tw-shadow-color: #181825;
      --tw-shadow: var(--tw-shadow-colored);
    }

    /* Service card hover */
    .dark .dark\:hover\:bg-white\/10:hover {
      background-color: #45475a;
    }

    /* Ping / docker stats box */
    .dark .dark\:bg-theme-900\/50 {
      background-color: #11111b;
    }

    /* Stats background */
    .dark .dark\:bg-theme-900\/20 {
      background-color: #313244;
    }

    /* Progress bar fill */
    .dark .dark\:bg-theme-900\/40 {
      background-color: rgba(137, 180, 250, 0.3);
    }

    /* Section names + service descriptions */
    .dark .dark\:text-theme-300 {
      color: #cdd6f4;
    }

    /* API error text */
    .text-theme-900 {
      color: #1e1e2e;
    }

    /* API error box */
    .bg-rose-900\/80 {
      background-color: #f38ba8;
    }

    /* Version / update text */
    .dark .dark\:text-theme-400 {
      color: #cdd6f4;
    }

    /* Search bar icon (non-dark variant) */
    .text-white {
      color: #bac2de;
    }

    /* Top separator */
    .dark .dark\:border-theme-200\/50 {
      border-color: #585b70;
    }

    /* Section / description hover */
    .dark .dark\:hover\:text-theme-300:hover {
      color: #5e97f3;
    }

    /* Service names + widget stats */
    .dark .dark\:text-theme-200 {
      color: #cdd6f4;
    }

    /* Status: running / healthy */
    .text-emerald-500\/80 {
      color: #c2ebbf;
    }

    /* Status: unhealthy */
    .text-orange-400\/50 {
      color: #fbeece;
    }

    /* Status: down / bad ping */
    .text-rose-500\/80 {
      color: #ec5d80;
    }

  bookmarks.yaml: |
    - Developer:
        - GitHub:
            - icon: github.svg
              href: https://github.com
        - Claude:
            - icon: si-claude
              href: https://claude.ai
