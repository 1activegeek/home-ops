---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-store
  target:
    name: homepage-secret
  dataFrom:
    - extract:
        key: homepage
  data:
    - secretKey: prowlarr_api_key
      remoteRef:
        key: prowlarr
        property: api_key
    - secretKey: radarr4k_api_key
      remoteRef:
        key: radarr4k
        property: api_key
    - secretKey: plex_token
      remoteRef:
        key: autoscan
        property: plex_token
