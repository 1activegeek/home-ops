---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: webtop
spec:
  chartRef:
    kind: OCIRepository
    name: webtop
  interval: 1h
  values:
    controllers:
      main:
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/webtop
              tag: ubuntu-xfce
            env:
              PUID: "1000"
              PGID: "1000"
              TZ: America/Denver
              MAX_RESOLUTION: 1920x1080
              SELKIES_MANUAL_WIDTH: "1920"
              SELKIES_MANUAL_HEIGHT: "1080"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  initialDelaySeconds: 30
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 3000
                  initialDelaySeconds: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                memory: 4Gi

    service:
      main:
        controller: main
        ports:
          http:
            port: 3000

    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 5Gi
        globalMounts:
          - path: /config
      shm:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Gi
        globalMounts:
          - path: /dev/shm
      workspace:
        type: nfs
        server: ${NFS_SERVER}
        path: /volume2/projects
        globalMounts:
          - path: /workspace

    route:
      app:
        hostnames: ["webtop.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: webtop
                port: 3000
