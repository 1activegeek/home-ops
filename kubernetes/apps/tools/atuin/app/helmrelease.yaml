---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: atuin
spec:
  chartRef:
    kind: OCIRepository
    name: atuin
  interval: 1h
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/atuinsh/atuin
              tag: 18.15.2
            args:
              - start
            env:
              ATUIN_HOST: 0.0.0.0
              ATUIN_PORT: "8888"
              ATUIN_OPEN_REGISTRATION: "true"
              RUST_LOG: info
              ATUIN_DB_URI:
                valueFrom:
                  secretKeyRef:
                    name: atuin-secret
                    key: database_url
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8888
                  initialDelaySeconds: 15
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 8888
                  initialDelaySeconds: 15
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi

      postgres:
        containers:
          postgres:
            image:
              repository: postgres
              tag: 17-alpine
            env:
              POSTGRES_DB: atuin
              POSTGRES_USER: atuin
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: atuin-secret
                    key: db_password
              PGDATA: /var/lib/postgresql/data/pgdata
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 256Mi
        pod:
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999

    service:
      main:
        controller: main
        ports:
          http:
            port: 8888
      postgres:
        controller: postgres
        ports:
          postgres:
            port: 5432

    persistence:
      postgres-data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 2Gi
        advancedMounts:
          postgres:
            postgres:
              - path: /var/lib/postgresql/data

    route:
      app:
        hostnames: ["atuin.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: atuin-main
                port: 8888
