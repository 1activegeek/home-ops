---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mattermost
spec:
  chartRef:
    kind: OCIRepository
    name: mattermost
  interval: 1h
  values:
    controllers:
      main:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/mattermost/mattermost-team-edition
              tag: 11.9.0
            env:
              MM_SERVICESETTINGS_SITEURL: "https://matter.${SECRET_DOMAIN}"
              MM_SERVICESETTINGS_LISTENADDRESS: ":8065"
              # NOTE: No SSO here by design. Mattermost Team Edition v11 has no
              # working SSO path — v11.0 removed GitLab SSO from TE, and OpenID
              # Connect is license-gated (utils/license.go Features.OpenId). The
              # TE image is built BuildEnterpriseReady=false, so it holds no
              # license and the gate can never pass: MM_OPENIDSETTINGS_* load
              # into config but EnableSignUpWithOpenId is forced false and
              # /oauth/openid/login returns 501. Authentik SSO would require the
              # mattermost-enterprise-edition image run unlicensed (free "Entry"
              # tier, which carries a 10k channel-message history cap).
              # Decision 2026-07-17: stay on TE with email/password auth.
              MM_SQLSETTINGS_DRIVERNAME: postgres
              MM_SQLSETTINGS_DATASOURCE:
                valueFrom:
                  secretKeyRef:
                    name: mattermost-secret
                    key: MM_SQLSETTINGS_DATASOURCE
              MM_FILESETTINGS_DIRECTORY: /mattermost/data/
              MM_LOGSETTINGS_ENABLECONSOLE: "true"
              MM_LOGSETTINGS_CONSOLELEVEL: INFO
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v4/system/ping
                    port: 8065
                  initialDelaySeconds: 60
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v4/system/ping
                    port: 8065
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch

      postgres:
        strategy: Recreate
        containers:
          postgres:
            image:
              repository: postgres
              tag: 18-alpine
            env:
              POSTGRES_DB: mattermost
              POSTGRES_USER: mattermost
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: mattermost-secret
                    key: db_password
              PGDATA: /var/lib/postgresql/data/pgdata
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
        pod:
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999

    service:
      main:
        controller: main
        ports:
          http:
            port: 8065
      postgres:
        controller: postgres
        ports:
          postgres:
            port: 5432

    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 25Gi
        advancedMounts:
          main:
            app:
              - path: /mattermost/data
                subPath: data
              - path: /mattermost/config
                subPath: config
              - path: /mattermost/logs
                subPath: logs
              - path: /mattermost/plugins
                subPath: plugins
              - path: /mattermost/client/plugins
                subPath: client-plugins
              - path: /mattermost/bleve-indexes
                subPath: bleve-indexes
      postgres-data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 5Gi
        advancedMounts:
          postgres:
            postgres:
              - path: /var/lib/postgresql/data

    route:
      app:
        hostnames: ["matter.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: mattermost-main
                port: 8065
