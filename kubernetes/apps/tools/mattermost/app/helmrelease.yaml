---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mattermost
spec:
  chartRef:
    kind: OCIRepository
    name: mattermost
  interval: 1h
  values:
    controllers:
      main:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/mattermost/mattermost-team-edition
              tag: 11.9.0
            env:
              MM_SERVICESETTINGS_SITEURL: "https://matter.${SECRET_DOMAIN}"
              MM_SERVICESETTINGS_LISTENADDRESS: ":8065"
              # --- SSO via Authentik (Team Edition uses the GitLab OAuth slot,
              # with endpoints overridden to point at Authentik). The custom
              # Authentik "mattermost" scope returns GitLab-shaped claims
              # (id/username/login/email/name) that MM's GitLab parser expects. ---
              MM_GITLABSETTINGS_ENABLE: "true"
              MM_GITLABSETTINGS_SCOPE: "openid email profile mattermost"
              MM_GITLABSETTINGS_AUTHENDPOINT: "https://auth.${SECRET_DOMAIN}/application/o/authorize/"
              MM_GITLABSETTINGS_TOKENENDPOINT: "https://auth.${SECRET_DOMAIN}/application/o/token/"
              MM_GITLABSETTINGS_USERAPIENDPOINT: "https://auth.${SECRET_DOMAIN}/application/o/userinfo/"
              MM_GITLABSETTINGS_ID:
                valueFrom:
                  secretKeyRef:
                    name: mattermost-secret
                    key: MM_GITLABSETTINGS_ID
              MM_GITLABSETTINGS_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: mattermost-secret
                    key: MM_GITLABSETTINGS_SECRET
              MM_SQLSETTINGS_DRIVERNAME: postgres
              MM_SQLSETTINGS_DATASOURCE:
                valueFrom:
                  secretKeyRef:
                    name: mattermost-secret
                    key: MM_SQLSETTINGS_DATASOURCE
              MM_FILESETTINGS_DIRECTORY: /mattermost/data/
              MM_LOGSETTINGS_ENABLECONSOLE: "true"
              MM_LOGSETTINGS_CONSOLELEVEL: INFO
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v4/system/ping
                    port: 8065
                  initialDelaySeconds: 60
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v4/system/ping
                    port: 8065
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 2000
            runAsGroup: 2000
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch

      postgres:
        strategy: Recreate
        containers:
          postgres:
            image:
              repository: postgres
              tag: 18-alpine
            env:
              POSTGRES_DB: mattermost
              POSTGRES_USER: mattermost
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: mattermost-secret
                    key: db_password
              PGDATA: /var/lib/postgresql/data/pgdata
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
        pod:
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999

    service:
      main:
        controller: main
        ports:
          http:
            port: 8065
      postgres:
        controller: postgres
        ports:
          postgres:
            port: 5432

    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 25Gi
        advancedMounts:
          main:
            app:
              - path: /mattermost/data
                subPath: data
              - path: /mattermost/config
                subPath: config
              - path: /mattermost/logs
                subPath: logs
              - path: /mattermost/plugins
                subPath: plugins
              - path: /mattermost/client/plugins
                subPath: client-plugins
              - path: /mattermost/bleve-indexes
                subPath: bleve-indexes
      postgres-data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 5Gi
        advancedMounts:
          postgres:
            postgres:
              - path: /var/lib/postgresql/data

    route:
      app:
        hostnames: ["matter.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: mattermost-main
                port: 8065
