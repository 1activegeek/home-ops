---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: code-server
spec:
  chartRef:
    kind: OCIRepository
    name: code-server
  interval: 1h
  values:
    controllers:
      main:
        containers:
          app:
            image:
              repository: ghcr.io/coder/code-server
              tag: latest
            args:
              - --auth
              - none
              - --bind-addr
              - 0.0.0.0:8080
              - /workspace
            env:
              TZ: America/Denver
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 15
                  periodSeconds: 10
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 8080
                  initialDelaySeconds: 15
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
        pod:
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000

    service:
      main:
        controller: main
        ports:
          http:
            port: 8080

    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 5Gi
        globalMounts:
          - path: /home/coder
      workspace:
        type: nfs
        server: ${NFS_SERVER}
        path: /volume2/projects
        globalMounts:
          - path: /workspace

    route:
      app:
        hostnames: ["code.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: code-server
                port: 8080
