---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bridge
spec:
  chartRef:
    kind: OCIRepository
    name: bridge
  interval: 1h
  values:
    controllers:
      bridge:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: docker.io/library/node
              tag: 24-alpine
            command: ["node", "/app/server.js"]
            env:
              PORT: &port "5100"
              DATA_DIR: /data
              VAULT_DELIVERABLES_DIR: /vault-deliverables
              SITES_DIR: /sites
              VAULT_DIR: /vault
              APPRISE_URL: http://apprise.tools:8000/notify
              QDRANT_URL: http://qdrant.ai:6333
              OLLAMA_URL: http://ollama.ai:11434
            envFrom:
              - secretRef:
                  name: bridge-secret
                  optional: true
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: 5100
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
    service:
      app:
        ports:
          http:
            port: 5100
    persistence:
      app:
        type: nfs
        server: ${NFS_SERVER}
        path: "/volume1/syncthing/ic_documents/5 Shared/bridge/app"
        globalMounts:
          - path: /app
            readOnly: true
      data:
        type: nfs
        server: ${NFS_SERVER}
        path: "/volume1/syncthing/ic_documents/5 Shared/bridge/data"
        globalMounts:
          - path: /data
      vault-deliverables:
        type: nfs
        server: ${NFS_SERVER}
        path: "/volume1/syncthing/ic_obsidian/lifeOS/3 Resources/deliverables"
        globalMounts:
          - path: /vault-deliverables
            readOnly: true
      sites:
        type: nfs
        server: ${NFS_SERVER}
        path: "/volume1/syncthing/ic_documents/5 Shared/bridge/sites"
        globalMounts:
          - path: /sites
            readOnly: true
      vault:
        type: nfs
        server: ${NFS_SERVER}
        path: "/volume1/syncthing/ic_obsidian/lifeOS"
        globalMounts:
          - path: /vault
            readOnly: true
