---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: element
spec:
  chartRef:
    kind: OCIRepository
    name: element
  interval: 1h
  values:
    controllers:
      main:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/element-hq/element-web
              tag: v1.12.23
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 80
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            # The upstream element-web image runs nginx as root (master binds
            # :80, workers drop to nginx) — the 65534 default does not apply.
            securityContext:
              allowPrivilegeEscalation: false
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 128Mi

    service:
      app:
        controller: main
        ports:
          http:
            port: 80

    persistence:
      config:
        type: configMap
        name: element-config
        globalMounts:
          - path: /app/config.json
            subPath: config.json
            readOnly: true

    route:
      app:
        hostnames: ["matrix.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          # /.well-known/matrix/* on this host is served by Synapse via its own
          # "wellknown" route (more-specific path wins at the gateway).
          - backendRefs:
              - name: element
                port: 80
