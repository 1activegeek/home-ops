---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: forgejo
spec:
  chartRef:
    kind: OCIRepository
    name: forgejo
  interval: 1h
  values:
    image:
      rootless: true

    podAnnotations:
      reloader.stakater.com/auto: "true"

    service:
      http:
        type: ClusterIP
        port: 3000
      ssh:
        type: LoadBalancer
        port: 22

    persistence:
      enabled: true
      storageClass: longhorn
      size: 10Gi

    gitea:
      admin:
        existingSecret: forgejo-secret

      additionalConfigSources:
        - secret:
            secretName: forgejo-config-secret

      config:
        server:
          DOMAIN: "git.${SECRET_DOMAIN}"
          ROOT_URL: "https://git.${SECRET_DOMAIN}"
          SSH_DOMAIN: "git.${SECRET_DOMAIN}"
          SSH_PORT: 22
          START_SSH_SERVER: true

        service:
          DISABLE_REGISTRATION: false
          REQUIRE_SIGNIN_VIEW: false
          DEFAULT_KEEP_EMAIL_PRIVATE: true

        repository:
          DEFAULT_PRIVATE: last

        openid:
          ENABLE_OPENID_SIGNIN: true
          ENABLE_OPENID_SIGNUP: true

        ui:
          DEFAULT_THEME: catppuccin-mocha-blue
          THEMES: >-
            catppuccin-latte-rosewater,catppuccin-latte-flamingo,catppuccin-latte-pink,catppuccin-latte-mauve,
            catppuccin-latte-red,catppuccin-latte-maroon,catppuccin-latte-peach,catppuccin-latte-yellow,
            catppuccin-latte-green,catppuccin-latte-teal,catppuccin-latte-sky,catppuccin-latte-sapphire,
            catppuccin-latte-blue,catppuccin-latte-lavender,catppuccin-frappe-rosewater,catppuccin-frappe-flamingo,
            catppuccin-frappe-pink,catppuccin-frappe-mauve,catppuccin-frappe-red,catppuccin-frappe-maroon,
            catppuccin-frappe-peach,catppuccin-frappe-yellow,catppuccin-frappe-green,catppuccin-frappe-teal,
            catppuccin-frappe-sky,catppuccin-frappe-sapphire,catppuccin-frappe-blue,catppuccin-frappe-lavender,
            catppuccin-macchiato-rosewater,catppuccin-macchiato-flamingo,catppuccin-macchiato-pink,catppuccin-macchiato-mauve,
            catppuccin-macchiato-red,catppuccin-macchiato-maroon,catppuccin-macchiato-peach,catppuccin-macchiato-yellow,
            catppuccin-macchiato-green,catppuccin-macchiato-teal,catppuccin-macchiato-sky,catppuccin-macchiato-sapphire,
            catppuccin-macchiato-blue,catppuccin-macchiato-lavender,catppuccin-mocha-rosewater,catppuccin-mocha-flamingo,
            catppuccin-mocha-pink,catppuccin-mocha-mauve,catppuccin-mocha-red,catppuccin-mocha-maroon,
            catppuccin-mocha-peach,catppuccin-mocha-yellow,catppuccin-mocha-green,catppuccin-mocha-teal,
            catppuccin-mocha-sky,catppuccin-mocha-sapphire,catppuccin-mocha-blue,catppuccin-mocha-lavender,
            catppuccin-rosewater-auto,catppuccin-flamingo-auto,catppuccin-pink-auto,catppuccin-mauve-auto,
            catppuccin-red-auto,catppuccin-maroon-auto,catppuccin-peach-auto,catppuccin-yellow-auto,
            catppuccin-green-auto,catppuccin-teal-auto,catppuccin-sky-auto,catppuccin-sapphire-auto,
            catppuccin-blue-auto,catppuccin-lavender-auto

        # OIDC is configured post-deploy via Forgejo admin UI:
        # Administration > Identity & Access > Authentication Sources
        # Provider: OpenID Connect
        # Discovery URL: https://authentik.${SECRET_DOMAIN}/application/o/forgejo/.well-known/openid-configuration

    # PostgreSQL subchart (Bitnami)
    postgresql:
      enabled: true
      global:
        postgresql:
          auth:
            existingSecret: forgejo-secret
            secretKeys:
              adminPasswordKey: db-password
              userPasswordKey: db-password
            database: forgejo
            username: forgejo
      primary:
        persistence:
          enabled: true
          storageClass: longhorn
          size: 5Gi

    # Disable Redis cluster (use memory for single-pod)
    redis-cluster:
      enabled: false

    # Disable HA PostgreSQL
    postgresql-ha:
      enabled: false

    strategy:
      type: Recreate

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi
