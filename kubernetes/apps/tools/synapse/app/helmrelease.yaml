---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: synapse
spec:
  chartRef:
    kind: OCIRepository
    name: synapse
  interval: 1h
  values:
    controllers:
      main:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          # Synapse does not auto-generate its ed25519 signing key when running
          # from a mounted config; generate once onto the data PVC.
          init-keys:
            image:
              repository: ghcr.io/element-hq/synapse
              tag: v1.156.0
            command: ["/bin/sh", "-c"]
            args:
              - |
                test -f /data/keys/signing.key || /usr/local/bin/generate_signing_key -o /data/keys/signing.key
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
        containers:
          app:
            image:
              repository: ghcr.io/element-hq/synapse
              tag: v1.156.0
            env:
              SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8008
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8008
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 6
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 250m
                memory: 1Gi
              limits:
                memory: 4Gi
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            fsGroup: 65534
            fsGroupChangePolicy: OnRootMismatch

      postgres:
        strategy: Recreate
        containers:
          postgres:
            image:
              repository: postgres
              tag: 18-alpine
            env:
              POSTGRES_DB: synapse
              POSTGRES_USER: synapse
              POSTGRES_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: synapse-secret
                    key: db_password
              # Synapse requires a C-locale database (LC_COLLATE/LC_CTYPE=C).
              POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
              PGDATA: /var/lib/postgresql/data/pgdata
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
        pod:
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 999

    service:
      main:
        controller: main
        ports:
          http:
            port: 8008
      postgres:
        controller: postgres
        ports:
          postgres:
            port: 5432

    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 20Gi
        advancedMounts:
          main:
            app:
              - path: /data/media
                subPath: media
              - path: /data/keys
                subPath: keys
            init-keys:
              - path: /data/keys
                subPath: keys
      postgres-data:
        type: persistentVolumeClaim
        storageClass: longhorn
        accessMode: ReadWriteOnce
        size: 5Gi
        advancedMounts:
          postgres:
            postgres:
              - path: /var/lib/postgresql/data
      config:
        type: secret
        name: synapse-secret
        advancedMounts:
          main:
            app:
              - path: /data/homeserver.yaml
                subPath: homeserver.yaml
                readOnly: true
      log-config:
        type: configMap
        name: synapse-log-config
        advancedMounts:
          main:
            app:
              - path: /data/log.config
                subPath: log.config
                readOnly: true

    route:
      app:
        hostnames: ["synapse.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: synapse-main
                port: 8008
      # Serve /.well-known/matrix/* on the server_name host (matrix.<domain>,
      # otherwise Element Web's host) so clients discover the client API and
      # MAS. More-specific path beats Element's catch-all at the gateway.
      wellknown:
        hostnames: ["matrix.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /.well-known/matrix
            backendRefs:
              - name: synapse-main
                port: 8008
