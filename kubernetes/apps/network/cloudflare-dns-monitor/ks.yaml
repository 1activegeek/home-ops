---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudflare-dns-monitor
spec:
  interval: 1h
  path: ./kubernetes/apps/network/cloudflare-dns-monitor/app
  # ${SECRET_DOMAIN} is the only substituted var (the CF zone to poll). The job
  # scripts use no ${VAR} shell expansion, so there are no substitution surprises.
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: network
  wait: false
