---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cloudflare-dns-monitor
spec:
  # Every 30 min — poll the configured Cloudflare zone, alert on records not seen before.
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: check
              image: python:3.14-alpine
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              env:
                - name: PYTHONDONTWRITEBYTECODE
                  value: "1"
                - name: ZONE_NAME
                  value: "${SECRET_DOMAIN}"
                # Mattermost delivery: post to #infrastructure via the Jarvis
                # bot token (native avatar + name). Internal cluster URL — no
                # external DNS/TLS dependency.
                - name: MATTERMOST_URL
                  value: "http://mattermost-main.tools.svc.cluster.local:8065"
                - name: MATTERMOST_CHANNEL_ID
                  value: "6qik9sorwbfcmdzqpwuwhwk69r"
                - name: MATTERMOST_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: cloudflare-dns-monitor-secret
                      key: MATTERMOST_TOKEN
                - name: CF_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: cloudflare-dns-secret
                      key: api-token
              command: ["python3", "-c"]
              args:
                - |
                  import json, os, sys, urllib.request, urllib.parse
                  CF = os.environ["CF_API_TOKEN"]
                  ZONE = os.environ["ZONE_NAME"]
                  MM = os.environ["MATTERMOST_URL"].rstrip("/")
                  MM_TOKEN = os.environ["MATTERMOST_TOKEN"]
                  MM_CHANNEL = os.environ["MATTERMOST_CHANNEL_ID"]
                  STATE = "/state/seen-records.json"
                  API = "https://api.cloudflare.com/client/v4"

                  def cf(path):
                      req = urllib.request.Request(API + path, headers={"Authorization": "Bearer " + CF})
                      with urllib.request.urlopen(req, timeout=20) as r:
                          return json.load(r)

                  def mm_post(message):
                      data = json.dumps({"channel_id": MM_CHANNEL, "message": message}).encode()
                      req = urllib.request.Request(
                          MM + "/api/v4/posts", data=data,
                          headers={"Authorization": "Bearer " + MM_TOKEN,
                                   "Content-Type": "application/json"})
                      with urllib.request.urlopen(req, timeout=20) as r:
                          r.read()

                  zr = cf("/zones?name=" + urllib.parse.quote(ZONE)).get("result") or []
                  if not zr:
                      print("ERROR: zone %r not found or token lacks access" % ZONE, file=sys.stderr)
                      sys.exit(1)
                  zid = zr[0]["id"]
                  recs = cf("/zones/%s/dns_records?per_page=1000" % zid).get("result", [])
                  current = {r["id"]: "%s %s -> %s" % (r["type"], r["name"], r.get("content", "")) for r in recs}

                  try:
                      with open(STATE) as f:
                          prior = json.load(f)
                  except FileNotFoundError:
                      prior = None

                  if prior is None:
                      print("Baseline established: %d records (no alert on first run)." % len(current))
                  else:
                      # Diff on record ID *and* content: catch additions, content
                      # changes (same ID, e.g. a hijacked A/SPF/DKIM record), and
                      # removals (e.g. a deleted SPF/DKIM record). All three matter
                      # for "did my DNS change without me" — not just new records.
                      added = [current[i] for i in current if i not in prior]
                      changed = ["%s  (was: %s)" % (current[i], prior[i])
                                 for i in current if i in prior and current[i] != prior[i]]
                      removed = [prior[i] for i in prior if i not in current]
                      sections = []
                      if added:   sections.append("Added:\n%s"   % "\n".join("- " + x for x in added))
                      if changed: sections.append("Changed:\n%s" % "\n".join("- " + x for x in changed))
                      if removed: sections.append("Removed:\n%s" % "\n".join("- " + x for x in removed))
                      if sections:
                          body = "Cloudflare DNS change(s) in %s:\n\n%s" % (ZONE, "\n\n".join(sections))
                          print(body)
                          message = "**DNS change in %s** (+%d ~%d -%d)\n\n%s" % (
                              ZONE, len(added), len(changed), len(removed), body)
                          mm_post(message)
                          print("Alert dispatched to Mattermost #infrastructure.")
                      else:
                          print("No DNS changes (%d total)." % len(current))

                  with open(STATE, "w") as f:
                      json.dump(current, f)
              volumeMounts:
                - name: state
                  mountPath: /state
              resources:
                requests:
                  cpu: 10m
                  memory: 48Mi
                limits:
                  memory: 96Mi
          volumes:
            - name: state
              persistentVolumeClaim:
                claimName: cloudflare-dns-monitor-state
